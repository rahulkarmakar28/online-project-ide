version: "3.9"

volumes:
  postgres_data:
  projects_data:   # shared between master and worker

networks:
  ide_net:
    driver: bridge

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     johndoe
      POSTGRES_PASSWORD: randompassword
      POSTGRES_DB:       mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ide_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U johndoe -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 10

