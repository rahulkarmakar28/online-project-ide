version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  CloudIDE — docker-compose.yml
#
#  Services:  db · master · worker · frontend
#
#  Quick start:
#    1. cp server/master/.env.example  server/master/.env
#    2. docker compose up --build
#
#  Before first run — build sandbox images on the host:
#    cd server/worker && bash build-images.sh
# ─────────────────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  projects_data:      # shared between master (scaffold) and worker (mount into containers)

networks:
  ide_net:
    driver: bridge

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     johndoe
      POSTGRES_PASSWORD: randompassword
      POSTGRES_DB:       mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ide_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U johndoe -d mydb"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Master (REST API + Auth) ────────────────────────────────────────────────
  master:
    build:
      context:    ./server/master
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:                   3000
      DATABASE_URL:           postgresql://johndoe:randompassword@db:5432/mydb?schema=public
      JWT_SECRET:             ${JWT_SECRET:-changeme_access_secret_32chars_min}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET:-changeme_refresh_secret_32chars_min}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL:           ${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - projects_data:/app/projects
    ports:
      - "3000:3000"
    networks:
      - ide_net

  # ── Worker (Terminal WS + Editor socket) ───────────────────────────────────
  worker:
    build:
      context:    ./server/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - master
    environment:
      TERMINAL_PORT: 4000
      EDITOR_PORT:   5000
      SANDBOX_MODE:  docker
      # Worker needs to reach Docker on the host to spawn language containers.
      # On Linux:   /var/run/docker.sock (default)
      # On Windows: //./pipe/docker_engine
      DOCKER_HOST: ${DOCKER_HOST:-unix:///var/run/docker.sock}
    volumes:
      - projects_data:/app/projects
      # Mount Docker socket so worker can create/start sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4000:4000"
      - "5000:5000"
    networks:
      - ide_net

  # ── Frontend (Vite dev server) ──────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - master
      - worker
    environment:
      VITE_API_URL:             http://localhost:3000
      VITE_WORKER_TERMINAL_URL: ws://localhost:4000
      VITE_WORKER_EDITOR_URL:   http://localhost:5000
    ports:
      - "5173:5173"
    networks:
      - ide_net